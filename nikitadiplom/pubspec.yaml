name: nikitadiplom
description: "Мобильное приложение для учёта доходов и расходов"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  sqflite: ^2.4.2
  path: ^1.9.1
  path_provider: ^2.1.5
  flutter_bloc: ^9.1.0
  bloc: ^9.0.0
  equatable: ^2.0.7
  intl: ^0.20.2
  google_mlkit_text_recognition: ^0.14.0
  image_picker: ^1.1.2
  fl_chart: ^0.70.2
  flutter_local_notifications: ^18.0.1
  uuid: ^4.5.1
  flutter_localizations:
    sdk: flutter
  shared_preferences: ^2.5.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/tips.json
